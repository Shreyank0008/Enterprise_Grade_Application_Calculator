name: 🚀 Deploy to AWS EC2
on:
  push:
    branches: [ main ]
# Cancel any in-progress deployment if a new commit is pushed
concurrency:
  group: deploy-ec2
  cancel-in-progress: true
jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build — verify the app compiles cleanly
  # ─────────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 📦 Install dependencies
        run: npm ci
      - name: 🔨 Build production bundle
        run: npm run build
      - name: ✅ Verify dist/index.html exists
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ Build failed — dist/index.html not found"
            exit 1
          fi
          SIZE=$(du -sh dist/index.html | cut -f1)
          echo "✅ dist/index.html built successfully (${SIZE})"
  # ─────────────────────────────────────────────
  # JOB 2: Deploy — pull & rebuild on the EC2 server
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build          # only runs if build job passes
    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}
    steps:
      - name: 🚀 SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e   # exit immediately on any error
            echo "──────────────────────────────────────"
            echo "🚀 Starting deployment at $(date -u)"
            echo "──────────────────────────────────────"
            # Navigate to the app directory
            cd /home/ubuntu/calculator
            # Pull latest changes from main
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            # Install any new/updated dependencies
            echo "📦 Installing dependencies..."
            npm ci --prefer-offline
            # Build the production bundle
            echo "🔨 Building..."
            npm run build
            # Verify build output
            if [ ! -f dist/index.html ]; then
              echo "❌ Build failed — dist/index.html missing!"
              exit 1
            fi
            SIZE=$(du -sh dist/index.html | cut -f1)
            echo "──────────────────────────────────────"
            echo "✅ Deployment complete at $(date -u)"
            echo "📄 dist/index.html → ${SIZE}"
            echo "🌐 Live at: http://${{ secrets.EC2_HOST }}"
            echo "──────────────────────────────────────"
